apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-app
  namespace: sre-demo
data:
  app.py: |
    import os
    import socket
    from http.server import BaseHTTPRequestHandler, HTTPServer

    REDIS_HOST = os.getenv("REDIS_HOST", "redis")
    REDIS_PORT = int(os.getenv("REDIS_PORT", "6379"))

    def check_redis():
        try:
            with socket.create_connection((REDIS_HOST, REDIS_PORT), timeout=1):
                return True, "redis reachable"
        except Exception as e:
            return False, str(e)

    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/health":
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"checkout-api process healthy\n")
                return

            ok, msg = check_redis()

            if ok:
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"checkout-api OK. Redis dependency OK.\n")
            else:
                self.send_response(500)
                self.end_headers()
                body = f"checkout-api ERROR. Redis dependency failed: {msg}\n"
                self.wfile.write(body.encode())

        def log_message(self, format, *args):
            print("%s - %s" % (self.address_string(), format % args))

    HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
