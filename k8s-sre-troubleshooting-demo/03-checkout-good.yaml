apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: sre-demo
  annotations:
    kubernetes.io/change-cause: "Deploy working checkout API"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: python:3.12-alpine
          command: ["python", "/app/app.py"]
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: app-code
              mountPath: /app
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "300m"
              memory: "128Mi"
      volumes:
        - name: app-code
          configMap:
            name: checkout-app
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: sre-demo
spec:
  selector:
    app: checkout-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
